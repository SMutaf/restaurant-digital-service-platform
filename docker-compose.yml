services:
  postgres:
    image: postgres:16
    container_name: restaurant-platform-postgres
    environment:
      POSTGRES_DB: restaurant_platform
      POSTGRES_USER: restaurant_app
      POSTGRES_PASSWORD: restaurant_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_app -d restaurant_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
